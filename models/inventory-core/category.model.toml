#:schema ../../schemas/entity-definition.schema.json
# Item category model
format_version = 1
version = "1.0.0"

[entity]
name = "category"
table = "categories"
description = "Category dictionary for inventory grouping."
fields = [
  { name = "name", type = "label", required = true, default = "", indexed = true },
  { name = "description", type = "text", default = "" },
]
