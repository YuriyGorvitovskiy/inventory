<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; background:#f8fafc; }
      h1 { margin-top:0; }
      .card { background:white; padding:1rem; border-radius:8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom:1rem; }
      form { display:grid; grid-template-columns: repeat(4, minmax(160px,1fr)); gap: .5rem; }
      form .full { grid-column: 1 / -1; }
      input, textarea { width:100%; padding:.45rem; box-sizing:border-box; }
      table { width:100%; border-collapse:collapse; background:white; }
      th, td { border:1px solid #ddd; padding:.5rem; text-align:left; vertical-align: top; }
      th { background:#eef2ff; }
      .actions { display:flex; gap:.4rem; }
      button { cursor:pointer; padding:.4rem .7rem; }
      .danger { background:#ef4444; border:none; color:white; }
      .muted { color:#6b7280; font-size:.9rem; }
    </style>
  </head>
  <body>
    <h1>Inventory</h1>

    <div class="card">
      <h3>Add Item</h3>
      <form id="add-form">
        <input name="name" placeholder="Name" required />
        <input name="manufacturer" placeholder="Manufacturer" />
        <input name="category" placeholder="Category" />
        <input name="sku" placeholder="SKU" />
        <input name="quantity" type="number" min="0" value="0" required />
        <input name="location" placeholder="Location" />
        <textarea class="full" name="description" rows="2" placeholder="Description"></textarea>
        <button class="full" type="submit">Add Item</button>
      </form>
    </div>

    <p class="muted">Click <strong>Edit</strong> to update inline, then <strong>Save</strong>. Click <strong>Delete</strong> to remove.</p>

    <table>
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Manufacturer</th><th>Category</th><th>SKU</th><th>Qty</th><th>Location</th><th>Description</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <script>
      const rows = document.getElementById('rows');
      const addForm = document.getElementById('add-form');

      const fields = ['name','manufacturer','category','sku','quantity','location','description'];

      function esc(v) {
        return (v ?? '').toString().replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
      }

      function rowHtml(item) {
        return `<tr data-id="${item.id}">
          <td>${item.id}</td>
          ${fields.map(f => `<td data-field="${f}">${esc(item[f])}</td>`).join('')}
          <td class="actions">
            <button onclick="startEdit(${item.id})">Edit</button>
            <button class="danger" onclick="deleteItem(${item.id})">Delete</button>
          </td>
        </tr>`;
      }

      async function load() {
        const res = await fetch('/api/items');
        const data = await res.json();
        rows.innerHTML = data.map(rowHtml).join('');
      }

      addForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(addForm);
        const payload = Object.fromEntries(fd.entries());
        payload.quantity = Number(payload.quantity || 0);

        const res = await fetch('/api/items', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          alert(await res.text());
          return;
        }

        addForm.reset();
        addForm.quantity.value = 0;
        await load();
      });

      window.deleteItem = async (id) => {
        if (!confirm(`Delete item ${id}?`)) return;
        const res = await fetch(`/api/items/${id}`, { method:'DELETE' });
        if (!res.ok) alert(await res.text());
        await load();
      };

      window.startEdit = (id) => {
        const tr = rows.querySelector(`tr[data-id="${id}"]`);
        fields.forEach((f) => {
          const td = tr.querySelector(`td[data-field="${f}"]`);
          const current = td.textContent;
          const inputType = f === 'quantity' ? 'number' : 'text';
          td.innerHTML = `<input type="${inputType}" value="${esc(current)}" ${f==='quantity' ? 'min="0"' : ''}>`;
        });

        const actions = tr.querySelector('.actions');
        actions.innerHTML = `<button onclick="saveEdit(${id})">Save</button><button onclick="load()">Cancel</button>`;
      };

      window.saveEdit = async (id) => {
        const tr = rows.querySelector(`tr[data-id="${id}"]`);
        const payload = {};
        fields.forEach((f) => {
          const val = tr.querySelector(`td[data-field="${f}"] input`).value;
          payload[f] = (f === 'quantity') ? Number(val || 0) : (val || null);
        });
        if (!payload.name) {
          alert('Name is required');
          return;
        }

        const res = await fetch(`/api/items/${id}`, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          alert(await res.text());
          return;
        }

        await load();
      };

      load();
    </script>
  </body>
</html>
